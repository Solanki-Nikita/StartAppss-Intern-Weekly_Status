<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two Column Layout</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="left">
        <h2>Left Column</h2>
        <p>
            This is the left section of the layout. It can contain navigation,
            sidebar content, or additional information.
        </p>
    </div>

    <div class="right">
        <h2>Right Column</h2>
        <p>
            This is the main content area. Usually this section is wider
            and contains the primary content of the page.
        </p>
    </div>

</div>

</body>
</html>
